<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/src/output.css" rel="stylesheet">
</head>
<body class="bg-slate-900 font-lato">
  
    <main>
        <section class="container px-5 py-10 my-10 mx-auto mt-20 inset-0 backdrop-blur-md bg-black/40
         border-white border-2 rounded-lg w-1/2">
            <div>
                <h1 class="text-red-700 text-center text-3xl font-black">Conversor de Moédas</h1>
            </div>

            <div>
                <h2 class="text-white text-center text-xl font-medium">Converter Real para outra moeda</h2>
            </div>

            <div class="flex flex-col items-start mt-5 space-y-5">
                <label for="valor" class="text-white">Tipo de Conversão</label>

                <select id="moedas" class="outline-offset-2 outline-sky-500 focus:outline-[0.1rem] text-white w-1/3 bg-black rounded-md p-2">
                    
                    <option selected disabled class="text-red-500" value="selecone">Selecione a moeda</option>
                    <option class="backdrop-blur-md bg-white/50" value="dollar">DOLLAR</option>
                    <option class="backdrop-blur-md bg-white/50" value="euro">EURO</option>
                    <option class="backdrop-blur-md bg-white/50" value="inr">INR</option>
                    
                </select>
            </div>

            <div class="flex flex-col items-start mt-5 space-y-5">
                <label for="#" class="text-white">Digite o valor</label>

                <input id="valorUsuario" type="text" name="name" class="text-white rounded-lg py-2 px-5 w-full outline-offset-2 outline-sky-500 focus:outline-[0.1rem] border-[0.1rem] border-slate-50" placeholder="Digite o valor em dolar">
            </div>

            <div class="relative flex flex-col items-center">
                <div class="absolute text-white w-full mt-8">
                    <div id="resultadoBtn" class="text-center"></div>
                </div>
                <button onclick="converter()" class="mx-auto mt-24 text-white bg-green-500 rounded-md p-2 cursor-pointer hover:bg-green-700 hover:transform hover:duration-300 hover:ease-in-out">Converter</button>
            </div>
            

        </section>
    </main>
    <script src="/script.js"></script>
    <script src="https://kit.fontawesome.com/9898c47017.js" crossorigin="anonymous"></script>
</body>
</html>
